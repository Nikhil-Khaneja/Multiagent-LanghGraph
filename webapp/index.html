<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Multi-Agent LLM Backend Dashboard</title>
  <link rel="stylesheet" href="/web/assets/styles.css" />
</head>
<body>
  <div class="app-container">
    <header class="header">
      <h1>🤖 Multi-Agent System Dashboard</h1>
      <div class="metrics-bar" id="metricsBar">
        <span class="badge" id="latencyBadge">Avg Latency: -- ms</span>
        <span class="badge" id="ingestBadge">Ingested: 0</span>
      </div>
    </header>

    <main class="main-content">
      <section class="panel agent-panel">
        <h2>Ask the Agent</h2>
        <div class="input-group">
          <textarea id="queryInput" placeholder="Enter your research query here..."></textarea>
          <div class="controls">
            <label><input type="checkbox" id="streamToggle" checked> Stream Response</label>
            <button id="sendBtn" class="btn primary">Execute</button>
          </div>
        </div>
        
        <div class="trace-container" id="traceContainer">
          <!-- Traces will be appended here -->
        </div>
        
        <div class="response-container">
          <h3>Final Response</h3>
          <div id="finalResponse" class="response-box">Awaiting query...</div>
        </div>
      </section>

      <section class="panel ingestion-panel">
        <h2>RAG Ingestion</h2>
        <div class="input-group">
          <input type="text" id="sourceId" placeholder="Source ID (e.g., doc-1)" />
          <textarea id="docContent" placeholder="Paste context or document content here to ingest..."></textarea>
          <button id="ingestBtn" class="btn secondary">Ingest to Kafka</button>
        </div>
        <div id="ingestStatus" class="status-msg"></div>
      </section>
    </main>
  </div>
  <script src="/web/assets/app.js"></script>
</body>
</html>
